<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
  <link rel="stylesheet" href="./color_converter.css" />
  <title>颜色转换器</title>
</head>

<body>
  <div class="content">
    <div class="header">
      <h1 class="title">颜色转换器</h1>
      <p class="subtitle">各种色彩空间互转</p>
    </div>

    <div class="color-cards-grid">
      <!-- sRGB -->
      <div class="color-card">
        <label>sRGB</label>
        <div>
          <div class="red">
            <label>R</label>
            <input type="number" id="srgb:r" min="0" max="1" step="0.001" value="0">
          </div>
          <div class="green">
            <label>G</label>
            <input type="number" id="srgb:g" min="0" max="1" step="0.001" value="0">
          </div>
          <div class="blue">
            <label>B</label>
            <input type="number" id="srgb:b" min="0" max="1" step="0.001" value="0">
          </div>
        </div>
        <div>
          <div class="red">
            <label>8-bit</label>
            <input type="number" id="srgb.uint:r" min="0" max="255" value="0">
          </div>
          <div class="green">
            <label>8-bit</label>
            <input type="number" id="srgb.uint:g" min="0" max="255" value="0">
          </div>
          <div class="blue">
            <label>8-bit</label>
            <input type="number" id="srgb.uint:b" min="0" max="255" value="0">
          </div>
        </div>
        <div>
          <div>
            <label>HEX</label>
            <input type="text" id="srgb.hex" value="N/A" readonly>
          </div>
        </div>
        <div>
          <div>
            <label>CSS</label>
            <input type="text" id="srgb.rgb" value="N/A" readonly>
          </div>
        </div>
        <div>
          <div>
            <label>CSS</label>
            <input type="text" id="srgb.color" value="N/A" readonly>
          </div>
        </div>
        <label>Linear</label>
        <div>
          <div class="red">
            <label>R</label>
            <input type="number" id="srgb-linear:r" min="0" max="1" step="0.001" value="0">
          </div>
          <div class="green">
            <label>G</label>
            <input type="number" id="srgb-linear:g" min="0" max="1" step="0.001" value="0">
          </div>
          <div class="blue">
            <label>B</label>
            <input type="number" id="srgb-linear:b" min="0" max="1" step="0.001" value="0">
          </div>
        </div>
        <div>
          <div>
            <label>CSS</label>
            <input type="text" id="srgb-linear.color" value="N/A" readonly>
          </div>
        </div>
        <div>
          <div>
            <label>WGSL</label>
            <input type="text" id="srgb-linear.wgsl" value="N/A" readonly>
          </div>
        </div>
      </div>

      <!-- HSL -->
      <div class="color-card">
        <label>HSL</label>
        <div>
          <div>
            <label>H</label>
            <input type="number" id="hsl:h" min="0" max="1" step="0.0002" value="0">
          </div>
          <div>
            <label>S</label>
            <input type="number" id="hsl:s" min="0" max="1" step="0.001" value="0">
          </div>
          <div>
            <label>L</label>
            <input type="number" id="hsl:l" min="0" max="1" step="0.001" value="0">
          </div>
        </div>
        <div>
          <div>
            <label>CSS</label>
            <input type="text" id="hsl.hsl" value="N/A" readonly>
          </div>
        </div>
      </div>

      <!-- HSV -->
      <div class="color-card">
        <label>HSV</label>
        <div>
          <div>
            <label>H</label>
            <input type="number" id="hsv:h" min="0" max="1" step="0.0002" value="0">
          </div>
          <div>
            <label>S</label>
            <input type="number" id="hsv:s" min="0" max="1" step="0.001" value="0">
          </div>
          <div>
            <label>V</label>
            <input type="number" id="hsv:v" min="0" max="1" step="0.001" value="0">
          </div>
        </div>
      </div>

      <!-- OKLab -->
      <div class="color-card">
        <label>OKLab</label>
        <div>
          <div>
            <label>L</label>
            <input type="number" id="oklab:l" min="0" max="1" step="0.001" value="0">
          </div>
          <div>
            <label>a</label>
            <input type="number" id="oklab:a" min="-1" max="1" step="0.001" value="0">
          </div>
          <div>
            <label>b</label>
            <input type="number" id="oklab:b" min="-1" max="1" step="0.001" value="0">
          </div>
        </div>
        <div>
          <div>
            <label>CSS</label>
            <input type="text" id="oklab.oklab" value="N/A" readonly>
          </div>
        </div>
      </div>

      <!-- OKLCH -->
      <div class="color-card">
        <label>OKLCH</label>
        <div>
          <div>
            <label>L</label>
            <input type="number" id="oklch:l" min="0" max="1" step="0.001" value="0">
          </div>
          <div>
            <label>C</label>
            <input type="number" id="oklch:c" min="0" max="1" step="0.001" value="0">
          </div>
          <div>
            <label>H</label>
            <input type="number" id="oklch:h" min="0" max="1" step="0.0002" value="0">
          </div>
        </div>
        <div>
          <div>
            <label>CSS</label>
            <input type="text" id="oklch.oklch" value="N/A" readonly>
          </div>
        </div>
      </div>

      <!-- LMS -->
      <div class="color-card">
        <label>LMS</label>
        <div>
          <div>
            <label>L</label>
            <input type="number" id="lms:l" min="0" max="1" step="0.001" value="0">
          </div>
          <div>
            <label>M</label>
            <input type="number" id="lms:m" min="0" max="1" step="0.001" value="0">
          </div>
          <div>
            <label>S</label>
            <input type="number" id="lms:s" min="0" max="1" step="0.001" value="0">
          </div>
        </div>
      </div>
    </div>

    <p>颜色转换参见：<a href="https://www.w3.org/TR/css-color-4/">CSS Color Module Level 4 (www.w3.org)</a></p>

    <script src="./color_converter.js"></script>
  </div>
</body>

</html>
