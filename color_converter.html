<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
  <link rel="stylesheet" href="./color_converter.css" />
  <title>颜色转换器</title>
</head>

<body>
  <div class="content">
    <div class="header">
      <h1 class="title">颜色转换器</h1>
      <p class="subtitle">各种色彩空间互转</p>
    </div>

    <div class="color-cards-grid">
      <!-- sRGB -->
      <div class="color-card">
        <label>sRGB</label>
        <div>
          <div class="red"><label>R</label><input id="srgb-float:r"></div>
          <div class="green"><label>G</label><input id="srgb-float:g"></div>
          <div class="blue"><label>B</label><input id="srgb-float:b"></div>
        </div>
        <div>
          <div class="red"><label>8-bit</label><input id="srgb-uint:r"></div>
          <div class="green"><label>8-bit</label><input id="srgb-uint:g"></div>
          <div class="blue"><label>8-bit</label><input id="srgb-uint:b"></div>
        </div>
        <div>
          <div><label>HEX</label><input id="srgb-uint.hex" readonly></div>
        </div>
        <div>
          <div><label>CSS</label><input id="srgb-uint.rgb" readonly></div>
        </div>
        <div>
          <div><label>CSS</label><input id="srgb-float.color" readonly></div>

        </div><label>Linear</label>
        <div>
          <div class="red"><label>R</label><input id="srgb-linear:r"></div>
          <div class="green"><label>G</label><input id="srgb-linear:g"></div>
          <div class="blue"><label>B</label><input id="srgb-linear:b"></div>
        </div>
        <div>
          <div><label>CSS</label><input id="srgb-linear.color" readonly></div>
        </div>
        <div>
          <div><label>WGSL</label><input id="srgb-linear.wgsl" readonly></div>
        </div>
      </div>

      <!-- HSL -->
      <div class="color-card">
        <label>HSL</label>
        <div>
          <div><label>H</label><input id="hsl:h"></div>
          <div><label>S</label><input id="hsl:s"></div>
          <div><label>L</label><input id="hsl:l"></div>
        </div>
        <div>
          <div><label>CSS</label><input id="hsl.hsl" readonly></div>
        </div>
      </div>

      <!-- HSV -->
      <div class="color-card">
        <label>HSV</label>
        <div>
          <div><label>H</label><input id="hsv:h"></div>
          <div><label>S</label><input id="hsv:s"></div>
          <div><label>V</label><input id="hsv:v"></div>
        </div>
      </div>

      <!-- OKLab -->
      <div class="color-card">
        <label>OKLab</label>
        <div>
          <div><label>L</label><input id="oklab:l"></div>
          <div><label>a</label><input id="oklab:a"></div>
          <div><label>b</label><input id="oklab:b"></div>
        </div>
        <div>
          <div><label>CSS</label><input id="oklab.oklab" readonly></div>
        </div>
      </div>

      <!-- OKLCH -->
      <div class="color-card">
        <label>OKLCH</label>
        <div>
          <div><label>L</label><input id="oklch:l"></div>
          <div><label>C</label><input id="oklch:c"></div>
          <div><label>H</label><input id="oklch:h"></div>
        </div>
        <div>
          <div><label>CSS</label><input id="oklch.oklch" readonly></div>
        </div>
      </div>

      <!-- LMS -->
      <div class="color-card">
        <label>LMS</label>
        <div>
          <div><label>L</label><input id="lms:l"></div>
          <div><label>M</label><input id="lms:m"></div>
          <div><label>S</label><input id="lms:s"></div>
        </div>
      </div>
    </div>

    <p>颜色转换参见：<a href="https://www.w3.org/TR/css-color-4/">CSS Color Module Level 4 (www.w3.org)</a></p>

    <script src="./color_converter.js"></script>
  </div>
</body>

</html>
